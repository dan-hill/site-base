{{ define "main" }}
<section>
  <h1>{{ .Site.Title }}</h1>
  <p>{{ .Site.Params.description | default "A Hugo site using a shared module." }}</p>
</section>
<section>
  <h2>Available pages</h2>
  <ul>
    {{ range .Site.RegularPages.ByTitle }}
      <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
    {{ else }}
      <li>No regular pages available yet.</li>
    {{ end }}
  </ul>
</section>
{{ end }}
