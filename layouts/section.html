{{ define "main" }}
<section>
  <header>
    <h1>{{ .Title }}</h1>
  </header>
  {{ with .Content }}
    <div>{{ . }}</div>
  {{ end }}
  <ul>
    {{ range .RegularPages.ByTitle }}
      <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
    {{ else }}
      <li>No pages found in this section.</li>
    {{ end }}
  </ul>
</section>
{{ end }}
