[module]
workspace = 'off'

[[module.imports]]
path = 'github.com/dan-hill/ox'

[[module.imports.mounts]]
source = 'themes/ox/archetypes'
target = 'archetypes'

[[module.imports.mounts]]
source = 'themes/ox/assets'
target = 'assets'

[[module.imports.mounts]]
source = 'themes/ox/data'
target = 'data'

[[module.imports.mounts]]
source = 'themes/ox/layouts'
target = 'layouts'

[[module.imports.mounts]]
source = 'themes/ox/static'
target = 'static'

[module.hugoVersion]
min = '0.146.0'